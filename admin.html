<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real3D — Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-b"></div>
  <header class="site-header glass">
    <div class="wrap nav">
      <a class="brand" href="index.html"><span class="brand-mark"></span>Real3D</a>
      <nav>
        <a href="library.html">Biblioteca</a>
        <a href="plans.html">Planes</a>
        <a href="commission.html">Encargar</a>
        <a href="quality.html">Calidad</a>
        <a href="about.html">Empresa</a>
      </nav>
      <a class="btn btn-sm btn-ghost active" href="admin.html">Admin</a>
    </div>
  </header>

  <main class="wrap page-top">
    <section class="section-head reveal">
      <div class="eyebrow">Acceso interno</div>
      <h1>Gestiona el catálogo.</h1>
    </section>

    <section class="admin-grid">
      <div class="glass panel reveal">
        <form id="adminLogin" class="order-form">
          <div class="field">
            <label>Usuario</label>
            <input type="text" id="adminUser" placeholder="admin" />
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input type="password" id="adminPass" placeholder="••••••••" />
          </div>
          <button class="btn btn-gradient" type="submit">Entrar</button>
        </form>
      </div>

      <div class="glass panel reveal hidden" id="adminPanel">
        <form id="assetForm" class="order-form">
          <div class="grid-2">
            <div class="field"><label>Título</label><input id="assetTitle" type="text" required /></div>
            <div class="field"><label>Etiqueta</label><input id="assetTag" type="text" placeholder="product / character" required /></div>
          </div>
          <div class="grid-2">
            <div class="field"><label>Biblioteca</label>
              <select id="assetPlan">
                <option value="free">Free</option>
                <option value="pro">Pro</option>
                <option value="ultimate">Ultimate</option>
              </select>
            </div>
            <div class="field"><label>Modelo URL (.glb/.gltf)</label><input id="assetSrc" type="url" required /></div>
          </div>
          <div class="field"><label>Descripción</label><textarea id="assetDesc" rows="4"></textarea></div>
          <button class="btn btn-primary" type="submit">Añadir asset</button>
        </form>
        <div id="adminList" class="admin-list"></div>
      </div>
    </section>
  </main>

  <script src="models.js"></script>
  <script src="app.js"></script>
</body>
</html>
